<!-- Knowledge Graph Explorer — Immersive redesign -->
<div class="kg" id="knowledge-graph">

    <!-- ─── Top Bar ─── -->
    <div class="kg-topbar">
        <div class="kg-search">
            <svg class="kg-search__icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="kg-search" placeholder="Search notes and tags…" autocomplete="off">
            <kbd class="kg-search__kbd">/</kbd>
        </div>
        <div class="kg-topbar__actions">
            <button id="kg-btn-sidebar" class="kg-btn" title="Toggle settings panel">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
            </button>
            <button id="kg-btn-fullscreen" class="kg-btn" title="Toggle fullscreen">
                <svg id="kg-fs-expand" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                <svg id="kg-fs-shrink" class="kg-hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
            </button>
        </div>
    </div>

    <!-- ─── Main: Sidebar + Canvas ─── -->
    <div class="kg-body">

        <!-- Sidebar -->
        <aside class="kg-sidebar kg-sidebar--closed" id="kg-sidebar">
            <!-- Display -->
            <div class="kg-sidebar__section">
                <h4 class="kg-sidebar__heading">Display</h4>
                <label class="kg-check">
                    <input type="checkbox" id="kg-show-tags" checked>
                    <span>Show Tags</span>
                </label>
                <label class="kg-check">
                    <input type="checkbox" id="kg-color-folders">
                    <span>Color by Folder</span>
                </label>
                <label class="kg-check">
                    <input type="checkbox" id="kg-show-labels" checked>
                    <span>Show Labels</span>
                </label>
            </div>

            <!-- Physics -->
            <div class="kg-sidebar__section">
                <h4 class="kg-sidebar__heading">Physics</h4>
                <div class="kg-range">
                    <div class="kg-range__header">
                        <span>Repulsion</span><span id="kg-val-repulsion">-150</span>
                    </div>
                    <input type="range" id="kg-force-repulsion" min="-1000" max="0" step="10" value="-150">
                </div>
                <div class="kg-range">
                    <div class="kg-range__header">
                        <span>Distance</span><span id="kg-val-distance">100</span>
                    </div>
                    <input type="range" id="kg-force-distance" min="20" max="300" step="5" value="100">
                </div>
                <div class="kg-range">
                    <div class="kg-range__header">
                        <span>Gravity</span><span id="kg-val-gravity">0.1</span>
                    </div>
                    <input type="range" id="kg-force-gravity" min="0" max="1" step="0.05" value="0.1">
                </div>
            </div>

            <!-- Legend -->
            <div class="kg-sidebar__section">
                <h4 class="kg-sidebar__heading">Legend</h4>
                <div class="kg-legend">
                    <span class="kg-legend__item"><span class="kg-legend__dot kg-legend__dot--page"></span>Page</span>
                    <span class="kg-legend__item"><span class="kg-legend__dot kg-legend__dot--tag"></span>Tag</span>
                </div>
            </div>

            <!-- Stats -->
            <div class="kg-sidebar__footer">
                <span><strong id="kg-node-count">0</strong> nodes</span>
                <span class="kg-sidebar__sep">·</span>
                <span><strong id="kg-edge-count">0</strong> links</span>
            </div>
        </aside>

        <!-- Graph canvas -->
        <div class="kg-canvas" id="kg-canvas">
            <div class="kg-loading" id="kg-loading">
                <div class="kg-loading__ring"></div>
                <span>Loading graph&hellip;</span>
            </div>
            <div class="kg-tooltip" id="kg-tooltip"></div>

            <!-- Floating zoom controls -->
            <div class="kg-zoom" id="kg-zoom">
                <button class="kg-btn kg-btn--sm" id="kg-zoom-in" title="Zoom in">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
                <button class="kg-btn kg-btn--sm" id="kg-zoom-out" title="Zoom out">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
                <button class="kg-btn kg-btn--sm" id="kg-recenter" title="Reset view">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
        </div>

    </div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
    /* ── DOM refs ── */
    const $ = (s, p) => (p || document).querySelector(s);
    const canvas    = $("#kg-canvas");
    const loading   = $("#kg-loading");
    const search    = $("#kg-search");
    const sidebar   = $("#kg-sidebar");
    const tooltip   = $("#kg-tooltip");
    const showTags  = $("#kg-show-tags");
    const colorDir  = $("#kg-color-folders");
    const showLbls  = $("#kg-show-labels");
    const nodeCount = $("#kg-node-count");
    const edgeCount = $("#kg-edge-count");
    const graphRoot = $("#knowledge-graph");

    const repIn  = $("#kg-force-repulsion");
    const distIn = $("#kg-force-distance");
    const gravIn = $("#kg-force-gravity");

    /* ── State ── */
    let allNodes = [], rawEdges = [];
    let filteredNodes = [], filteredEdges = [];
    let isDragging = false, sidebarOpen = false;
    let width, height;
    let simulation, svg, g, linkG, nodeG, zoomBehavior;
    const adjList = new Map();
    const degreeMap = new Map();
    const colorScale = d3.scaleOrdinal(d3.schemeTableau10);
    const LABEL_MIN_DEGREE = 2;

    const getDeg = d => degreeMap.get(d.id) || 0;
    const getR   = d => d.type === "tag" ? 5 : 4 + Math.sqrt(getDeg(d)) * 2;

    function debounce(fn, ms) {
        let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
    }
    function buildDegreeMap() {
        degreeMap.clear();
        filteredNodes.forEach(n => { degreeMap.set(n.id, (adjList.get(n.id) || []).length); });
    }

    /* ── Sidebar toggle ── */
    $("#kg-btn-sidebar").addEventListener("click", () => {
        sidebarOpen = !sidebarOpen;
        sidebar.classList.toggle("kg-sidebar--closed", !sidebarOpen);
        $("#kg-btn-sidebar").classList.toggle("kg-btn--active", sidebarOpen);
        setTimeout(handleResize, 320);
    });

    /* ── Fullscreen ── */
    $("#kg-btn-fullscreen").addEventListener("click", () => {
        if (!document.fullscreenElement) {
            (graphRoot.requestFullscreen || graphRoot.webkitRequestFullscreen || graphRoot.msRequestFullscreen).call(graphRoot);
        } else {
            (document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen).call(document);
        }
    });
    function onFSChange() {
        const fs = !!document.fullscreenElement;
        graphRoot.classList.toggle("kg--fullscreen", fs);
        $("#kg-fs-expand").classList.toggle("kg-hidden", fs);
        $("#kg-fs-shrink").classList.toggle("kg-hidden", !fs);
        setTimeout(handleResize, 100);
    }
    document.addEventListener("fullscreenchange", onFSChange);
    document.addEventListener("webkitfullscreenchange", onFSChange);

    /* ── Keyboard shortcuts ── */
    document.addEventListener("keydown", e => {
        if (e.key === "/" && document.activeElement !== search) { e.preventDefault(); search.focus(); }
        if (e.key === "Escape") { search.blur(); resetHighlight(); }
    });

    /* ── Fetch & init ── */
    fetch("/data/graph.json", { cache: 'no-store' })
        .then(r => r.json())
        .then(data => {
            allNodes = data.nodes;
            rawEdges = data.edges.map(e => ({ s: e.source, t: e.target }));
            rawEdges.forEach(e => {
                if (!adjList.has(e.s)) adjList.set(e.s, []);
                if (!adjList.has(e.t)) adjList.set(e.t, []);
                adjList.get(e.s).push(e.t);
                adjList.get(e.t).push(e.s);
            });
            data = null;
            if (loading) loading.style.display = "none";
            initGraph();
            updateGraph();
        });

    function initGraph() {
        width  = canvas.clientWidth  || 900;
        height = canvas.clientHeight || 650;

        zoomBehavior = d3.zoom()
            .scaleExtent([0.1, 8])
            .on("zoom", e => g.attr("transform", e.transform));

        svg = d3.select("#kg-canvas")
            .append("svg")
            .attr("width", "100%")
            .attr("height", "100%")
            .attr("viewBox", [0, 0, width, height])
            .call(zoomBehavior);

        /* Glow filter for active nodes */
        const defs = svg.append("defs");
        const glow = defs.append("filter").attr("id", "glow").attr("x", "-50%").attr("y", "-50%").attr("width", "200%").attr("height", "200%");
        glow.append("feGaussianBlur").attr("stdDeviation", "3").attr("result", "blur");
        glow.append("feMerge").selectAll("feMergeNode").data(["blur", "SourceGraphic"]).enter().append("feMergeNode").attr("in", d => d);

        g = svg.append("g");
        linkG = g.append("g").attr("class", "links");
        nodeG = g.append("g").attr("class", "nodes");

        simulation = d3.forceSimulation()
            .alphaDecay(0.028)
            .velocityDecay(0.4)
            .alphaMin(0.001)
            .force("link",      d3.forceLink().id(d => d.id).distance(+distIn.value))
            .force("charge",    d3.forceManyBody().strength(d => (+repIn.value) * (1 + Math.sqrt(getDeg(d)) * 0.5)))
            .force("center",    d3.forceCenter(width / 2, height / 2))
            .force("x",         d3.forceX(width / 2).strength(d => (+gravIn.value) * (1 + Math.sqrt(getDeg(d)) * 0.2)))
            .force("y",         d3.forceY(height / 2).strength(d => (+gravIn.value) * (1 + Math.sqrt(getDeg(d)) * 0.2)))
            .force("collision", d3.forceCollide().radius(d => getR(d) + 5));

        simulation.on("tick", () => {
            linkG.selectAll("line")
                .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
            nodeG.selectAll("g.node")
                .attr("transform", d => `translate(${d.x},${d.y})`);
        });

        /* ── Event listeners ── */
        search.addEventListener("input", debounce(updateFilters, 150));
        showTags.addEventListener("change", () => updateGraph());
        colorDir.addEventListener("change", () => updateNodeColors());
        showLbls.addEventListener("change", () => {
            nodeG.selectAll("text").style("display", showLbls.checked ? null : "none");
        });

        repIn.addEventListener("input", e => {
            const v = +e.target.value;
            $("#kg-val-repulsion").textContent = v;
            simulation.force("charge").strength(d => v * (1 + Math.sqrt(getDeg(d)) * 0.5));
            simulation.alpha(0.3).restart();
        });
        distIn.addEventListener("input", e => {
            $("#kg-val-distance").textContent = e.target.value;
            simulation.force("link").distance(+e.target.value);
            simulation.alpha(0.3).restart();
        });
        gravIn.addEventListener("input", e => {
            const v = +e.target.value;
            $("#kg-val-gravity").textContent = v;
            simulation.force("x").strength(d => v * (1 + Math.sqrt(getDeg(d)) * 0.2));
            simulation.force("y").strength(d => v * (1 + Math.sqrt(getDeg(d)) * 0.2));
            simulation.alpha(0.3).restart();
        });

        /* Zoom buttons */
        $("#kg-zoom-in").addEventListener("click", () => svg.transition().duration(300).call(zoomBehavior.scaleBy, 1.4));
        $("#kg-zoom-out").addEventListener("click", () => svg.transition().duration(300).call(zoomBehavior.scaleBy, 0.7));
        $("#kg-recenter").addEventListener("click", () => svg.transition().duration(500).call(zoomBehavior.transform, d3.zoomIdentity));

        /* Resize handler */
        window.addEventListener("resize", debounce(handleResize, 150));

        /* Initial zoom-out once simulation cools */
        const initialZoomDone = { done: false };
        simulation.on("end.initialZoom", () => {
            if (initialZoomDone.done) return;
            initialZoomDone.done = true;
            const scale = 0.55;
            const tx = (width  - width  * scale) / 2;
            const ty = (height - height * scale) / 2;
            svg.transition().duration(800).ease(d3.easeCubicInOut)
                .call(zoomBehavior.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
        });

        /* Pause simulation off-screen */
        const obs = new IntersectionObserver(entries => {
            if (entries[0].isIntersecting) { if (simulation.alpha() > simulation.alphaMin()) simulation.restart(); }
            else simulation.stop();
        }, { threshold: 0.1 });
        obs.observe(canvas);
    }

    function handleResize() {
        width  = canvas.clientWidth;
        height = canvas.clientHeight;
        svg.attr("viewBox", [0, 0, width, height]);
        simulation.force("center", d3.forceCenter(width / 2, height / 2));
        simulation.force("x", d3.forceX(width / 2).strength(d => (+gravIn.value) * (1 + Math.sqrt(getDeg(d)) * 0.2)));
        simulation.force("y", d3.forceY(height / 2).strength(d => (+gravIn.value) * (1 + Math.sqrt(getDeg(d)) * 0.2)));
        simulation.alpha(0.3).restart();
    }

    /* ── Graph update ── */
    function updateGraph() {
        const st = showTags.checked;
        filteredNodes = allNodes.filter(n => st || n.type !== "tag");
        const ids = new Set(filteredNodes.map(n => n.id));
        filteredEdges = [];
        rawEdges.forEach(e => { if (ids.has(e.s) && ids.has(e.t)) filteredEdges.push({ source: e.s, target: e.t }); });
        buildDegreeMap();
        nodeCount.textContent = filteredNodes.length;
        edgeCount.textContent = filteredEdges.length;

        /* Links */
        const l = linkG.selectAll("line").data(filteredEdges, d => {
            const s = typeof d.source === "object" ? d.source.id : d.source;
            const t = typeof d.target === "object" ? d.target.id : d.target;
            return s < t ? s + "-" + t : t + "-" + s;
        });
        l.exit().remove();
        l.enter().append("line").attr("class", "link");

        /* Nodes */
        const n = nodeG.selectAll("g.node").data(filteredNodes, d => d.id);
        n.exit().remove();
        const nE = n.enter().append("g")
            .attr("class", d => "node " + d.type)
            .call(d3.drag().on("start", dragS).on("drag", dragD).on("end", dragE))
            .on("click", (ev, d) => {
                if (ev.defaultPrevented) return;
                if (d.url) window.location.href = d.url;
            })
            .on("pointerenter", (ev, d) => {
                if (!isDragging) {
                    highlightNode(d);
                    nodeG.selectAll("g.node").classed("hovered", n => n.id === d.id);
                }
            })
            .on("pointerleave", () => {
                if (!isDragging) {
                    nodeG.selectAll("g.node").classed("hovered", false);
                    resetHighlight();
                }
            });
        nE.append("circle").attr("r", getR);
        nE.append("text").attr("dx", 10).attr("dy", ".35em").text(d => d.title);

        if (!showLbls.checked) nodeG.selectAll("text").style("display", "none");
        updateNodeColors();

        simulation.nodes(filteredNodes);
        simulation.force("link").links(filteredEdges);
        simulation.alpha(0.8).restart();

        /* Animate new nodes in */
        nE.style("opacity", 0).transition().duration(400).ease(d3.easeCubicOut)
            .style("opacity", 1);

        updateFilters();
    }

    function updateNodeColors() {
        const useFolder = colorDir.checked;
        nodeG.selectAll("circle").style("fill", d => {
            if (d.type === "tag") return null;
            if (useFolder && d.path) return colorScale(d.path);
            return null;
        });
    }

    /* ── Highlight ── */
    function highlightNode(d) {
        const nArr = adjList.get(d.id) || [];
        const n1 = new Set(nArr);
        const n2 = new Set(nArr);
        nArr.forEach(id => (adjList.get(id) || []).forEach(id2 => n2.add(id2)));

        nodeG.selectAll("g.node")
            .classed("active",     n => n.id === d.id)
            .classed("neighbor",   n => n1.has(n.id))
            .classed("neighbor-2", n => n2.has(n.id) && !n1.has(n.id) && n.id !== d.id)
            .classed("dimmed",     n => n.id !== d.id && !n2.has(n.id))
            .classed("highlighted", false);

        linkG.selectAll("line")
            .classed("active", l => (l.source.id === d.id && n1.has(l.target.id)) || (l.target.id === d.id && n1.has(l.source.id)))
            .classed("active-2", l => {
                const a = (l.source.id === d.id && n1.has(l.target.id)) || (l.target.id === d.id && n1.has(l.source.id));
                return !a && ((n1.has(l.source.id) && n2.has(l.target.id)) || (n1.has(l.target.id) && n2.has(l.source.id)));
            })
            .classed("dimmed", l => {
                const s = l.source.id || l.source, t = l.target.id || l.target;
                return s !== d.id && t !== d.id && !n1.has(s) && !n1.has(t);
            });
    }

    function resetHighlight() {
        nodeG.selectAll("g.node").classed("active neighbor neighbor-2 dimmed highlighted", false);
        linkG.selectAll("line").classed("active active-2 dimmed", false);
        updateFilters();
    }

    /* ── Search filter ── */
    function updateFilters() {
        const q = search.value.toLowerCase().trim();
        if (!q) {
            if (nodeG.selectAll("g.node.active").size() === 0) {
                nodeG.selectAll("g.node").classed("dimmed", false);
                linkG.selectAll("line").classed("dimmed", false);
            }
            nodeG.selectAll("g.node").classed("highlighted", false);
            return;
        }
        let matches;
        if (q.startsWith("path:")) {
            const p = q.slice(5);
            matches = filteredNodes.filter(n => n.path && n.path.toLowerCase().includes(p));
        } else {
            matches = filteredNodes.filter(n => n.title.toLowerCase().includes(q));
        }
        const mIds = new Set(matches.map(n => n.id));
        nodeG.selectAll("g.node").classed("highlighted", d => mIds.has(d.id)).classed("dimmed", d => !mIds.has(d.id));
        linkG.selectAll("line").classed("dimmed", true);
    }

    /* ── Drag ── */
    function dragS(ev, d) { isDragging = true; if (!ev.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; highlightNode(d); }
    function dragD(ev, d) { d.fx = ev.x; d.fy = ev.y; }
    function dragE(ev, d) { isDragging = false; if (!ev.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; resetHighlight(); }
});
</script>
