<div class="local-graph">
    <h3>Interactive Graph</h3>
    <div id="graph-container">
        <div id="graph-loading" style="text-align: center; padding: 50px;">Loading Graph...</div>
    </div>
</div>

<style>
.local-graph {
    margin: 30px 0;
    padding: 20px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--entry);
    color: var(--primary);
}

.local-graph h3 {
    margin-top: 0;
    margin-bottom: 20px;
    font-size: 1.2rem;
    font-weight: 600;
}

#graph-container {
    width: 100%;
    height: 400px;
    min-height: 400px;
    overflow: hidden;
    cursor: grab;
    background: var(--theme);
    position: relative;
    border-radius: calc(var(--radius) / 2);
}

#graph-container:active {
    cursor: grabbing;
}

.node {
    cursor: pointer;
}

.node circle {
    stroke: var(--theme);
    stroke-width: 1.5px;
    transition: r 0.2s ease;
}

.node.page circle {
    fill: var(--secondary);
}

.node.tag circle {
    fill: #ffaa00; /* Distinct color for tags */
}

.node.current circle {
    fill: var(--primary);
    stroke: var(--secondary);
    stroke-width: 2px;
}

.node:hover circle {
    r: 12px !important;
}

.node text {
    font-size: 11px;
    font-weight: 500;
    fill: var(--secondary);
    pointer-events: none;
    user-select: none;
    text-shadow: 0 1px 2px var(--theme), 0 -1px 2px var(--theme), 1px 0 2px var(--theme), -1px 0 2px var(--theme);
}

.node.current text {
    fill: var(--primary);
    font-weight: 700;
}

.link {
    stroke: var(--tertiary);
    stroke-opacity: 0.5;
    stroke-width: 1.5px;
}

[data-theme="dark"] .node text {
    text-shadow: 0 1px 3px var(--theme), 0 -1px 3px var(--theme), 1px 0 3px var(--theme), -1px 0 3px var(--theme);
}
</style>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const container = document.getElementById('graph-container');
    const loading = document.getElementById('graph-loading');
    const width = container.clientWidth || 800;
    const height = container.clientHeight || 400;
    const currentTitle = {{ .Title | jsonify }};

    fetch('/data/graph.json')
        .then(res => {
            if (!res.ok) throw new Error("Failed to fetch graph data");
            return res.json();
        })
        .then(data => {
            if (loading) loading.style.display = 'none';
            renderGraph(data, currentTitle);
        })
        .catch(err => {
            console.error("Local Graph Error:", err);
            if (loading) loading.innerText = "Error loading graph data.";
        });

    function renderGraph(data, currentTitle) {
        const normalize = (s) => s ? s.trim().toLowerCase() : "";
        const targetTitle = normalize(currentTitle);
        
        // Try to find current node by title
        let currentNode = data.nodes.find(n => normalize(n.title) === targetTitle);
        
        // If not found, try adding 'tag:' prefix (for tag pages)
        if (!currentNode) {
            currentNode = data.nodes.find(n => normalize(n.id) === "tag:" + targetTitle);
        }

        // If still not found, try finding by URL
        if (!currentNode) {
            const currentPath = window.location.pathname;
            currentNode = data.nodes.find(n => n.url && (normalize(n.url) === normalize(currentPath) || normalize(n.url) === normalize(currentPath + "/") || normalize(n.url + "/") === normalize(currentPath)));
        }

        if (!currentNode) {
            if (loading) {
                loading.style.display = 'block';
                loading.innerText = "Interactive graph not available for this page.";
            }
            return;
        }

        const neighborIds = new Set();
        neighborIds.add(currentNode.id);
        
        data.edges.forEach(edge => {
            if (edge.source === currentNode.id) neighborIds.add(edge.target);
            if (edge.target === currentNode.id) neighborIds.add(edge.source);
        });

        const localNodes = data.nodes.filter(n => neighborIds.has(n.id));
        const localEdges = data.edges.filter(e => neighborIds.has(e.source) && neighborIds.has(e.target));

        const svg = d3.select("#graph-container")
            .append("svg")
            .attr("width", "100%")
            .attr("height", "100%")
            .attr("viewBox", [0, 0, width, height])
            .call(d3.zoom()
                .scaleExtent([0.5, 4])
                .on("zoom", (event) => {
                    g.attr("transform", event.transform);
                }));

        const g = svg.append("g");

        const simulation = d3.forceSimulation(localNodes)
            .force("link", d3.forceLink(localEdges).id(d => d.id).distance(140))
            .force("charge", d3.forceManyBody().strength(-400))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(50));

        const link = g.append("g")
            .attr("class", "links")
            .selectAll("line")
            .data(localEdges)
            .join("line")
            .attr("class", "link");

        const node = g.append("g")
            .attr("class", "nodes")
            .selectAll("g")
            .data(localNodes)
            .join("g")
            .attr("class", d => `node ${d.type} ${d.id === currentNode.id ? 'current' : ''}`)
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended))
            .on("click", (event, d) => {
                if (d.url) window.location.href = d.url;
            });

        node.append("circle")
            .attr("r", d => d.id === currentNode.id ? 10 : 7);

        node.append("text")
            .attr("dx", 14)
            .attr("dy", ".35em")
            .text(d => d.title);

        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            node
                .attr("transform", d => `translate(${d.x},${d.y})`);
        });

        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }
    }
});
</script>
