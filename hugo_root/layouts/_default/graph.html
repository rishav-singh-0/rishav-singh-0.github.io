{{- define "main" }}

<article class="post-single">
  <header class="page-hero">
    <h1 class="page-hero__title">{{ .Title }}</h1>
    <p class="page-hero__subtitle">{{ .Description | default "Explore connections between notes" }}</p>
  </header>

  {{- if .Content }}
  <div class="post-content">
    {{ .Content }}
  </div>
  {{- end }}

  {{- partial "full-graph.html" . -}}

</article>

{{- end }}{{/* end main */}}
